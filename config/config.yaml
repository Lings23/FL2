# ============================================================
#  Federated Security Research Framework — Master Config
# ============================================================

# ── Global ──────────────────────────────────────────────────
project:
  name: "FedSec"
  seed: 42
  log_level: "INFO"
  checkpoint_dir: "checkpoints/"
  log_dir: "logs/"

# ── Federated Learning ───────────────────────────────────────
federation:
  num_rounds: 50
  num_clients: 10
  clients_per_round: 5          # fraction or int
  min_fit_clients: 3
  min_evaluate_clients: 3
  min_available_clients: 5

# ── Dataset ──────────────────────────────────────────────────
dataset:
  name: "cifar10"               # cifar10 | mnist | femnist
  data_dir: "data/"
  partition: "iid"              # iid | non_iid | dirichlet
  dirichlet_alpha: 0.5          # used when partition=dirichlet
  num_classes: 10
  val_split: 0.1

# ── Model ────────────────────────────────────────────────────
model:
  architecture: "resnet18"      # resnet18 | cnn | mlp
  pretrained: false
  num_classes: 10

# ── Client Training ──────────────────────────────────────────
client:
  local_epochs: 5
  batch_size: 32
  optimizer: "sgd"              # sgd | adam
  learning_rate: 0.01
  momentum: 0.9
  weight_decay: 1e-4
  lr_scheduler: "cosine"        # cosine | step | none

# ── Aggregation Strategy ─────────────────────────────────────
strategy:
  name: "fedavg"                # fedavg | fedprox | fedyogi | scaffold | custom
  # FedProx
  proximal_mu: 0.01
  # FedYogi
  eta: 0.01
  eta_l: 0.0316
  beta_1: 0.9
  beta_2: 0.99
  tau: 1e-3

# ── Security ─────────────────────────────────────────────────
security:
  # Attack settings (for simulation)
  attack:
    enabled: false
    type: "none"                # none | label_flip | backdoor | dba | gaussian_noise | byzantine | model_replacement
    malicious_fraction: 0.2     # fraction of malicious clients
    # Backdoor / DBA specific
    backdoor_target_label: 0
    trigger_pattern: "pixel"    # pixel | pattern
    poison_fraction: 0.1
    trigger_size: 3
    trigger_value: 1.0
    dba_trigger_num: 4
    dba_gap: 3
    dba_base_row: 0
    dba_base_col: 0
    dba_scale_update: true
    dba_boost_factor: 10.0
    # Label flip specific
    source_label: 0
    target_label: 1

  # Defense settings
  defense:
    enabled: false
    type: "none"                # none | krum | trimmed_mean | flame | foolsgold | your_defense
    # Krum
    krum_num_to_select: 1
    # Trimmed Mean
    trim_fraction: 0.1
    # FLTrust
    root_dataset_size: 100
    # Extension point: add your defense parameters here
    custom_params: {}

# ── Evaluation ───────────────────────────────────────────────
evaluation:
  metrics:
    - "accuracy"
    - "loss"
    - "backdoor_asr"            # Attack Success Rate (optional)
  eval_every_n_rounds: 1
  save_best_model: true
  early_stopping:
    enabled: false
    patience: 10
    min_delta: 0.001

# ── Differential Privacy ─────────────────────────────────────
differential_privacy:
  enabled: false
  noise_multiplier: 1.0
  max_grad_norm: 1.0
  delta: 1e-5
